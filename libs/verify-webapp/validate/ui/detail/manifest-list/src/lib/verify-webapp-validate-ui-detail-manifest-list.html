<div
  class="flex flex-col gap-6 p-6 bg-surfaceLight border-b lg:border-b-0 lg:border-r border-gray-300 overflow-y-auto h-full"
>
  <h2 class="text-sm">Versiehistorie</h2>

  @for (
    manifest of store.manifestsReversed();
    track $index;
    let index = $index
  ) {
    <button
      type="button"
      class="relative rounded border border-gray-700 bg-white overflow-hidden flex-shrink-0 w-[165px] h-[150px] text-left"
      [ngClass]="{ 'border-2': store.isActiveManifest(manifest?.label) }"
      [attr.aria-label]="manifestAriaLabel(manifest?.label, index)"
      [attr.aria-pressed]="store.isActiveManifest(manifest?.label)"
      (click)="store.setActiveManifest(manifest?.label)"
    >
      @if (
        store.getManifestsThumbnailDataUrl(manifest?.label);
        as thumbnailDataUrl
      ) {
        <img
          [src]="thumbnailDataUrl"
          alt="Manifest claim thumbnail"
          class="w-full h-full object-contain"
        />
      } @else if (store.fileDataUrl(); as fileDataUrl) {
        <img
          [src]="fileDataUrl"
          alt="Manifest claim thumbnail"
          class="w-full h-full object-contain"
        />
      } @else if (isVideoFile(store.file()?.type)) {
        <div
          class="flex h-full w-full items-center justify-center bg-gray-100 text-gray-700"
          [attr.aria-label]="store.file()?.name || 'Videobestand'"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            class="h-10 w-10"
            fill="currentColor"
            aria-hidden="true"
          >
            <path
              d="M4.5 5.25A2.25 2.25 0 0 1 6.75 3h6.69a2.25 2.25 0 0 1 1.59.66l2.31 2.31a2.25 2.25 0 0 1 .66 1.59v.69h.75a2.25 2.25 0 0 1 2.25 2.25v7.5a2.25 2.25 0 0 1-2.25 2.25h-12A2.25 2.25 0 0 1 4.5 18V5.25zm12 .75v2.25h2.25L16.5 6zm-6.53 3.42a.75.75 0 0 0-1.22.58v5a.75.75 0 0 0 1.22.58l3.125-2.5a.75.75 0 0 0 0-1.16l-3.125-2.5z"
            />
          </svg>
        </div>
      } @else {
        <p class="p-2 text-xs">Geen thumbnails beschikbaar</p>
      }

      <div class="absolute top-2 left-2">
        <lib-verify-webapp-validate-ui-validation-badge
          [state]="manifestValidationState(manifest.validationResult)"
          textValid="Geverifieerd"
          textUntrusted="Niet vertrouwd"
        />
      </div>
    </button>
  }
</div>
