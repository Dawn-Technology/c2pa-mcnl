<div
  class="flex flex-col gap-6 p-6 bg-surfaceLight border-b lg:border-b-0 lg:border-r border-gray-300 overflow-y-auto h-full"
>
  <h2 class="text-sm">Versiehistorie</h2>

  @for (thumb of [1, 2, 3]; track thumb) {
  <div
    class="relative rounded border border-gray-700 bg-white overflow-hidden flex-shrink-0 w-[165px] h-[150px]"
    [ngClass]="{ 'border-2': store.activeManifest() === thumb }"
    (click)="store.setActiveManifest(thumb)"
    (keydown.enter)="store.setActiveManifest(thumb)"
    (keydown.space)="store.setActiveManifest(thumb)"
    role="button"
    tabindex="0"
  >
    <img
      [src]="'https://picsum.photos/seed/' + thumb + '/200/300'"
      alt="Manifest thumbnail"
      class="w-full h-full object-contain"
    />
    @if (thumb === 1) {
    <div class="absolute top-2 left-2">
      <lib-verify-webapp-validate-ui-validation-badge
        [valid]="true"
        textValid="OpenAI"
      />
    </div>
    } @if (thumb === 2) {
    <div class="absolute top-2 left-2">
      <lib-verify-webapp-validate-ui-validation-badge [valid]="false" />
    </div>
    }
  </div>
  }
</div>
