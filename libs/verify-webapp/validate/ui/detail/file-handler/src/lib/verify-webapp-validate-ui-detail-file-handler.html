<div
  class="flex flex-col gap-6 p-6 bg-surface border-b lg:border-b-0 lg:border-r border-gray-300 overflow-y-auto h-full"
>
  <h2 class="text-sm">Huidig bestand</h2>

  @if (store.file(); as file) {
    <lib-verify-webapp-validate-ui-file-card
      [fileUrl]="store.fileDataUrl()"
      [fileName]="file.name"
      [mimeType]="file.type"
      [subText]="store.fileDate()"
    />
  } @else {
    <p>Geen preview beschikbaar voor dit bestand</p>
  }

  <hr class="border-gray-300 -mx-6" />

  <h3 class="text-sm">Selecteer een ander bestand</h3>

  <lib-shared-ui-file-upload
    [acceptedMimeTypes]="uploadMimeTypes"
    [maxFileSizeBytes]="uploadMaxSize"
    [buttonOnly]="true"
    [buttonClass]="'w-full'"
    (valueChange)="store.setFile($event)"
  />

  <hr class="border-gray-300 -mx-6" />
</div>
