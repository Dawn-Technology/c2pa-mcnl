<figure class="flex items-center gap-3">
  <div
    class="rounded border border-gray-700 bg-white overflow-hidden flex-shrink-0 w-[65px] h-[65px]"
  >
    <img
      [src]="fileUrl()"
      [alt]="imageAltText()"
      [title]="fileName()"
      class="w-full h-full object-contain"
    />
  </div>
  <figcaption class="min-w-0">
    <p class="text-sm font-bold text-gray-900 truncate">{{ fileName() }}</p>
    @if (subText()) {
      <p class="text-sm mt-0.5">{{ subText() }}</p>
    }
  </figcaption>
</figure>
