<lib-verify-webapp-window-file-drop-overlay
  [enabled]="!store.isLoading()"
  (fileDropped)="store.setFile($event)"
>
  <lib-verify-webapp-shared-ui-loading-overlay [shown]="store.isLoading()" />

  <main
    aria-label="Bestandsverificatie details"
    class="grid grid-cols-[347px_220px_1fr] lg:h-[calc(100vh-var(--header-height))]"
  >
    <h1 class="sr-only">Details van contentverificatie</h1>

    <lib-verify-webapp-validate-ui-detail-file-handler />

    <lib-verify-webapp-validate-ui-detail-manifest-list />

    <lib-verify-webapp-validate-ui-detail-manifest-info />
  </main>
</lib-verify-webapp-window-file-drop-overlay>
