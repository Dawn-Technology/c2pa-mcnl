<div class="w-full mx-auto px-10 lg:w-1/2 xl:w-1/3">
  <form
    class="flex flex-col items-center gap-10"
    [ngStyle]="{ 'padding-bottom': footer.offsetHeight + 25 + 'px' }"
    (submit)="createAndSignManifest()"
  >
    <lib-signing-webapp-form-ui-upload-file-input
      inputId="leaf-certificate-upload"
      label="Leaf Certificaat (X.509)"
      description="Upload het publieke certificaatbestand (bijv. .pem, .cer) dat uw ondertekeningsidentiteit bevat. Dit certificaat wordt gebruikt om het manifest cryptografisch te ondertekenen."
      help="⚠️ Deze handmatige upload is uitsluitend bedoeld voor Proof-of-Concept-tests. In een echte C2PA-implementatie worden ondertekeningsreferenties nooit handmatig verwerkt; ze worden veilig beheerd en benaderd via een Hardware Security Module (HSM) of Key Management Service (KMS)."
      [required]="true"
      [acceptedMimeTypes]="certificateMimeTypes"
      [maxFileSizeBytes]="certificateMaxSize"
      [control]="signingForm.leafCertificate"
    />

    <lib-signing-webapp-form-ui-upload-file-input
      inputId="leaf-private-key-upload"
      label="Leaf Privésleutel"
      description="Upload het privésleutelbestand dat hoort bij uw Leaf Certificaat. Deze sleutel wordt gebruikt om de cryptografische handtekening voor het manifest te genereren."
      help="⚠️ Deze handmatige upload is uitsluitend bedoeld voor Proof-of-Concept-tests. In een echte C2PA-implementatie worden privésleutels nooit handmatig verwerkt; ze worden veilig beheerd en benaderd via een Hardware Security Module (HSM) of Key Management Service (KMS)."
      [required]="true"
      [acceptedMimeTypes]="keyMimeTypes"
      [maxFileSizeBytes]="keyMaxSize"
      [control]="signingForm.leafPrivateKey"
    />

    <lib-signing-webapp-form-ui-upload-file-input
      inputId="intermediate-certificate-upload"
      label="Tussenliggend Certificaat (X.509)"
      description="Upload het publieke certificaatbestand (bijv. .pem, .cer) dat uw Leaf Certificaat heeft uitgegeven. Dit certificaat is vereist om de 'Vertrouwensketen' te voltooien, waarmee uw identiteit wordt gekoppeld aan een vertrouwde Root-autoriteit."
      help="⚠️ In een productie-C2PA-workflow wordt de 'Vertrouwensketen' (Leaf + Tussenliggende certificaten) meestal automatisch samengesteld door de ondertekeningsservice of rechtstreeks ingesloten in de ondertekeningsidentiteit. Handmatige samenstelling is hier uitsluitend vereist voor demonstratiedoeleinden."
      [required]="true"
      [acceptedMimeTypes]="certificateMimeTypes"
      [maxFileSizeBytes]="certificateMaxSize"
      [control]="signingForm.intermediateCertificate"
    />

    <lib-signing-webapp-form-ui-upload-file-input
      inputId="vc-key-upload"
      label="Privésleutel van Digitale Identiteit"
      description="Upload het privésleutelbestand (bijv. .pem, .key) dat wordt gebruikt om het Verifieerbaar Credential te ondertekenen. Deze sleutel vertegenwoordigt de autoriteit van de Uitgever en is vereist om het credential cryptografisch aan te maken."
      help="⚠️ Dit simuleert de workflow van de Uitgever. In productie is deze sleutel vergrendeld op de beveiligde server van de Uitgever. Echte gebruikers (Houders) ontvangen alleen het definitieve ondertekende credential; zij beschikken niet over de privésleutel die is gebruikt om het aan te maken."
      [acceptedMimeTypes]="verifiableCredentialPrivateKeyMimeTypes"
      [maxFileSizeBytes]="verifiableCredentialPrivateKeyMaxSize"
      [control]="signingForm.verifiableCredentialPrivateKey"
    />

    <lib-signing-webapp-form-ui-form-group
      inputId="vc-issuer"
      label="Uitgever van Digitale Identiteit"
      description="Voer de naam of het identificator (bijv. DID) in van de organisatie die het Verifieerbaar Credential heeft uitgegeven. Deze entiteit fungeert als de vertrouwde autoriteit — zoals een overheid, universiteit of werkgever — die instaat voor de authenticiteit van uw identiteitsgegevens."
      help="ℹ️ In een echte Verifieerbaar Credential-workflow is de identiteit van de Uitgever cryptografisch vergrendeld binnen het credential zelf (vaak als een Gedecentraliseerde Identifier). We vragen u dit hier te definiëren om het uitgifteproces te simuleren en te demonstreren hoe de Uitgever wordt weergegeven in het Manifest."
      class="w-full"
    >
      <select
        id="vc-issuer"
        class="text-center p-2"
        [formField]="signingForm.verifiableCredentialIssuer"
      >
        <option value="" selected>--- Selecteer een optie ---</option>
        @for (issuer of verifiableCredentialIssuers; track $index) {
          <option [value]="issuer.did">{{ issuer.name }}</option>
        }
      </select>
    </lib-signing-webapp-form-ui-form-group>

    <lib-signing-webapp-form-ui-upload-file-input
      inputId="asset-upload"
      label="Het Bestand"
      description="Upload het mediabestand (bijv. .jpg, .png, .mp4) dat u wilt beveiligen. Dit bestand wordt cryptografisch gebonden aan het C2PA Manifest, zodat toekomstige manipulatie van het bestand kan worden gedetecteerd."
      help="ℹ️ Dit hulpmiddel simuleert een 'post-productie'-ondertekeningsworkflow. In een volledig geïntegreerd C2PA-ecosysteem verloopt dit ondertekeningsproces vaak automatisch aan de bron (in een beveiligde camera) of tijdens het exporteren (in creatieve software zoals Adobe Photoshop), in plaats van via een handmatige webupload."
      [required]="true"
      [acceptedMimeTypes]="assetMimeTypes"
      [maxFileSizeBytes]="assetMaxSize"
      [control]="signingForm.assetFile"
    />

    <lib-signing-webapp-form-ui-form-group
      inputId="actionsToBeAdded"
      label="Actie-asserties"
      description="Selecteer de acties die op dit bestand zijn uitgevoerd. De actie 'Geopend' is standaard altijd inbegrepen, omdat het bestand wordt 'geopend' voor ondertekening."
      class="w-full"
    >
      <ul class="w-full divide-y divide-gray-200">
        @for (option of actionOptions; track option.value) {
          <li class="flex items-center justify-between gap-4 py-3">
            <label
              [for]="'action-' + option.value"
              class="flex flex-col cursor-pointer"
            >
              <span class="text-sm font-semibold">{{ option.label }}</span>
              <span class="text-xs text-gray-500">{{
                option.description
              }}</span>
            </label>
            <input
              type="checkbox"
              class="w-5 h-5 shrink-0 cursor-pointer accent-blue-500"
              [id]="'action-' + option.value"
              [checked]="isActionSelected(option.value)"
              (change)="toggleAction(option.value)"
              [disabled]="option.disabled"
            />
          </li>
        }
      </ul>
    </lib-signing-webapp-form-ui-form-group>
  </form>

  <footer
    class="fixed bottom-0 left-0 w-full z-50 bg-white shadow-2xl py-4"
    #footer
  >
    <div class="container mx-auto flex flex-col items-center justify-between">
      <button
        type="button"
        (click)="createAndSignManifest()"
        [disabled]="signingForm().invalid()"
        class="bg-blue-500 text-white py-2 px-5 disabled:bg-gray-400 disabled:text-gray-200 disabled:cursor-not-allowed"
      >
        C2PA Manifest aanmaken en ondertekenen
      </button>
    </div>
  </footer>
</div>
