<form class="flex flex-col items-center gap-10">
  <lib-signing-webapp-form-ui-upload-file-input
    inputId="leaf-certificate-upload"
    label="Step 1.1: Upload the Leaf certificate"
    description="This is your end-entity certificate used for signing."
    [required]="true"
    [acceptedMimeTypes]="certificateMimeTypes"
    [maxFileSizeBytes]="certificateMaxSize"
    [control]="signingForm.leafCertificate"
  />

  <lib-signing-webapp-form-ui-upload-file-input
    inputId="leaf-private-key-upload"
    label="Step 1.2: Upload the Leaf private key"
    description="This is the private key corresponding to your Leaf certificate."
    [required]="true"
    [acceptedMimeTypes]="keyMimeTypes"
    [maxFileSizeBytes]="keyMaxSize"
    [control]="signingForm.leafPrivateKey"
  />

  <lib-signing-webapp-form-ui-upload-file-input
    inputId="intermediate-certificate-upload"
    label="Step 1.3: Upload the Intermediate certificate"
    description="This certificate links your Leaf certificate to a trusted root."
    [required]="true"
    [acceptedMimeTypes]="certificateMimeTypes"
    [maxFileSizeBytes]="certificateMaxSize"
    [control]="signingForm.intermediateCertificate"
  />

  <lib-signing-webapp-form-ui-upload-file-input
    inputId="vc-key-upload"
    label="Step 2.1: Upload your Verifiable Credential's private key"
    description="This is the private key corresponding to your Verifiable Credential's DID."
    [acceptedMimeTypes]="verifiableCredentialPrivateKeyMimeTypes"
    [maxFileSizeBytes]="verifiableCredentialPrivateKeyMaxSize"
    [control]="signingForm.verifiableCredentialPrivateKey"
  />

  <div class="flex flex-col gap-5 text-center">
    <label for="vc-issuer" class="text-xl font-bold"
      >Step 2.2: Select your employer</label
    >
    <p class="text-xs text-gray-700">
      This is the organization that <span class="italic">issued</span> your
      Verifiable Credential and can verify its authenticity.
    </p>
    <select
      id="vc-issuer"
      class="text-center p-2"
      [formField]="signingForm.verifiableCredentialIssuer"
    >
      <option value="" selected>--- Select an option ---</option>
      @for (issuer of verifiableCredentialIssuers; track $index) {
        <option [value]="issuer.did">{{ issuer.name }}</option>
      }
    </select>
  </div>

  <lib-signing-webapp-form-ui-upload-file-input
    inputId="asset-upload"
    label="Step 3: Upload the asset"
    description="This is the file you want to sign."
    [required]="true"
    [acceptedMimeTypes]="assetMimeTypes"
    [maxFileSizeBytes]="assetMaxSize"
    [control]="signingForm.assetFile"
  />

  <button
    type="button"
    (click)="createAndSignManifest()"
    [disabled]="signingForm().invalid()"
    class="bg-blue-500 text-white py-2 px-5"
  >
    Sign
  </button>
</form>
